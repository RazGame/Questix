version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: quest-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - quest-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quest-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/quest?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      BCRYPT_ROUNDS: 10
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - quest-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quest-frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - quest-network

volumes:
  mongodb_data:

networks:
  quest-network:
    driver: bridge
